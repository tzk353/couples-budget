<script>
// Load Firebase scripts dynamically to handle errors gracefully
(function() {
  var scripts = [
    'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js'
  ];
  var loaded = 0;
  function loadNext(i) {
    if (i >= scripts.length) { initApp(); return; }
    var s = document.createElement('script');
    s.src = scripts[i];
    s.onload = function() { loaded++; loadNext(i+1); };
    s.onerror = function() {
      var el = document.getElementById('loginErr');
      el.textContent = 'Firebase 載入失敗，請重新整理頁面';
      el.style.display = 'block'; el.style.color = '#c0505a';
    };
    document.head.appendChild(s);
  }
  loadNext(0);
})();
</script>

<script>

// ═══════════════════════════════════════════════════════
var _auth, _db, _unsub, _dbRef;

  '副業':{i:'💡',c:'#FF9800',b:'#FFF3E0'},'跑車入帳':{i:'🚗',c:'#E91E63',b:'#FCE4EC'},'跑車現金':{i:'💵',c:'#C2185B',b:'#F8BBD9'},

  '購物':{i:'🛍️',c:'#E91E63',b:'#FCE4EC'},'娛樂':{i:'🎬',c:'#9C27B0',b:'#F3E5F5'},'醫療':{i:'🏥',c:'#F44336',b:'#FFEBEE'},
  '水電瓦斯':{i:'💧',c:'#03A9F4',b:'#E1F5FE'},'電話費':{i:'📱',c:'#009688',b:'#E0F2F1'},'保險':{i:'🛡️',c:'#4CAF50',b:'#E8F5E9'},

var MO=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function saveDB(){
  if(!_dbRef)return;
  syncDot('syncing');
  _dbRef.set({records:_records,cats:_cats,persons:_persons})
    .then(function(){syncDot('ok');})
    .catch(function(){syncDot('err');showToast('儲存失敗','err');});
}

function initApp() {
  try {
    firebase.initializeApp({
      apiKey:"AIzaSyDPRlYuaKEDDG_0X_4b8A-4U7F-XhgImQw",
      authDomain:"couples-budget-c1b31.firebaseapp.com",
      projectId:"couples-budget-c1b31",

    });

  try { _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch(e){}

  // ── Auth buttons ──

        showLoginErr('帳號或密碼錯誤，請確認後再試');
      else showLoginErr('登入失敗：'+e.message);
    });
  });

  document.getElementById('btnRegister').addEventListener('click', function(){
    var email=document.getElementById('loginEmail').value.trim();

    if(pass.length<6){showLoginErr('密碼至少需要 6 個字元');return;}
    showLoginErr('');
    _auth.createUserWithEmailAndPassword(email,pass).catch(function(e){
      if(e.code==='auth/email-already-in-use') showLoginErr('此信箱已註冊，請直接登入');
      else showLoginErr('註冊失敗：'+e.message);
    });
  });

  document.getElementById('btnForgot').addEventListener('click', function(){
    var email=document.getElementById('loginEmail').value.trim();
    if(!email){showLoginErr('請先填寫電子郵件');return;}
    _auth.sendPasswordResetEmail(email)
      .then(function(){showLoginErr('✅ 重設密碼信已寄出！請去信箱查收',true);})
      .catch(function(e){showLoginErr('寄送失敗：'+e.message);});
  });

  document.getElementById('btnLogout').addEventListener('click', function(){
    if(_unsub)_unsub();
    _auth.signOut();
  });

  // ── Auth state ──
  _auth.onAuthStateChanged(function(user){
    if(user){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appShell').style.display='flex';
      document.getElementById('userEmail').textContent=user.email;
      syncDot('syncing');
      _dbRef=_db.collection('users').doc(user.uid).collection('data').doc('main');
      _unsub=_dbRef.onSnapshot(function(snap){
        if(snap.exists){var d=snap.data();_records=d.records||[];_cats=d.cats||defaultCats();_persons=d.persons||['老公','老婆'];}
        else{_records=[];_cats=defaultCats();_persons=['老公','老婆'];}
        syncDot('ok'); renderTab(curTab);
      },function(){syncDot('err');});
    } else {
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('appShell').style.display='none';
      _records=[];_cats=defaultCats();_persons=['老公','老婆'];_dbRef=null;
    }
  });

  // ── Nav ──
  document.querySelectorAll('.nav-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
      curTab=btn.dataset.tab; renderTab(curTab);
    });
  });

  // ── Edit modal buttons ──
  document.getElementById('editBtnExp').addEventListener('click',function(){editType='expense';editCat='';refreshEditType();});
  document.getElementById('editBtnInc').addEventListener('click',function(){editType='income';editCat='';refreshEditType();});
  document.getElementById('btnCancelEdit').addEventListener('click',function(){document.getElementById('editModal').classList.remove('open');});
  document.getElementById('editModal').addEventListener('click',function(e){if(e.target===document.getElementById('editModal'))document.getElementById('editModal').classList.remove('open');});
  document.getElementById('btnConfirmEdit').addEventListener('click', confirmEdit);

  // ── Delete modal buttons ──
  document.getElementById('btnExecDel').addEventListener('click',function(){
    if(!pendingDel)return;
    _records=_records.filter(function(r){return r.id!==pendingDel;});
    saveDB(); pendingDel=null;
    document.getElementById('confirmModal').classList.remove('open');
    showToast('已刪除','err'); renderTab(curTab);
  });
  document.getElementById('btnCancelDel').addEventListener('click',function(){document.getElementById('confirmModal').classList.remove('open');pendingDel=null;});
  document.getElementById('confirmModal').addEventListener('click',function(e){if(e.target===document.getElementById('confirmModal')){document.getElementById('confirmModal').classList.remove('open');pendingDel=null;}});
}

var curTab='dashboard';
function renderTab(n){
  if(n==='dashboard')renderDashboard();
  else if(n==='add')renderAdd();
  else if(n==='report')renderReport();
  else if(n==='history')renderHistory();
  else if(n==='settings')renderSettings();
}
function goTab(name){
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===name);});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.id==='tab-'+name);});
  curTab=name; renderTab(name);
}

// HELPERS

function catGridHtml(type,active){
  return (_cats[type]||[]).map(function(c){
    var cs=gc(c),on=active===c;
    return '<button class="cat-chip'+(on?' active':'')+'" style="'+(on?'background:'+cs.b+';border-color:'+cs.c+';':'')+'" data-cat="'+c+'">'+
      '<span class="ci">'+cs.i+'</span><span class="cl" style="'+(on?'color:'+cs.c+';font-weight:700':'')+'">'+(c.length>4?c.substring(0,4)+'…':c)+'</span></button>';
  }).join('');
}
function recRowHtml(r){
  var cs=gc(r.category);
  return '<div class="rec-row">'+
    '<div class="rec-left"><div class="cat-badge" style="background:'+cs.b+'">'+cs.i+'</div>'+
    '<div class="rec-info"><div class="rec-cat">'+r.category+' <span class="rec-person">· '+r.person+'</span></div>'+
    (r.note?'<div class="rec-note">'+r.note+'</div>':'')+
    '<div class="rec-date">'+r.date+'</div></div></div>'+
    '<div class="rec-right"><div class="rec-amt" style="color:'+(r.type==='income'?'#2e7d32':'#c0505a')+'">'+(r.type==='income'?'+':'-')+fmt(r.amount)+'</div>'+
    '<button class="edit-btn" data-id="'+r.id+'">✏️</button>'+
    '<button class="del-btn" data-id="'+r.id+'">✕</button></div></div>';
}
function bindRows(el){
  el.querySelectorAll('.edit-btn').forEach(function(b){b.addEventListener('click',function(){openEdit(Number(b.dataset.id));});});
  el.querySelectorAll('.del-btn').forEach(function(b){b.addEventListener('click',function(){askDel(Number(b.dataset.id));});});
}
function monthPickerHtml(y,m){
  var yrs=[];_records.forEach(function(r){var yr=new Date(r.date).getFullYear();if(yrs.indexOf(yr)<0)yrs.push(yr);});
  if(yrs.indexOf(new Date().getFullYear())<0)yrs.unshift(new Date().getFullYear());
  yrs.sort(function(a,b){return b-a;});
  return '<div class="month-picker">'+
    '<select class="input" id="selY">'+yrs.map(function(yr){return'<option value="'+yr+'"'+(yr===y?' selected':'')+'>'+yr+'年</option>';}).join('')+'</select>'+
    '<select class="input" id="selM">'+MO.map(function(mo,i){return'<option value="'+i+'"'+(i===m?' selected':'')+'>'+mo+'</option>';}).join('')+'</select></div>';
}

var dY=new Date().getFullYear(),dM=new Date().getMonth();
function renderDashboard(){
  var mr=_records.filter(function(r){var d=new Date(r.date);return d.getFullYear()===dY&&d.getMonth()===dM;});

  var exp=mr.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
  var bal=inc-exp;
  var rec=[].concat(_records).sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,6);
  var el=document.getElementById('tab-dashboard');
  el.innerHTML=monthPickerHtml(dY,dM)+
    '<div class="summary-grid">'+
    '<div class="summary-card" style="background:linear-gradient(135deg,#f0faf0,#d6efd6)"><div class="sum-icon">💰</div><div class="sum-label">本月收入</div><div class="sum-amt" style="color:#2e7d32">'+fmt(inc)+'</div></div>'+
    '<div class="summary-card" style="background:linear-gradient(135deg,#fdf0f3,#f5d5dc)"><div class="sum-icon">💸</div><div class="sum-label">本月支出</div><div class="sum-amt" style="color:#c0505a">'+fmt(exp)+'</div></div>'+
    '<div class="summary-card" style="grid-column:1/-1;background:'+(bal>=0?'linear-gradient(135deg,#eff6fc,#d6e8f5)':'linear-gradient(135deg,#fff0f0,#ffd8d8)')+'"><div class="sum-icon">'+(bal>=0?'🏦':'⚠️')+'</div><div class="sum-label">本月結餘</div><div class="sum-amt" style="font-size:22px;color:'+(bal>=0?'#1565c0':'#c0505a')+'">'+fmt(bal)+'</div></div>'+
    '</div>'+
    '<div class="section"><div class="sec-header"><span class="sec-title">最近記錄</span><button class="link-btn" id="btnSeeAll">查看全部 →</button></div>'+
    (rec.length?rec.map(recRowHtml).join(''):'<div class="empty">還沒有記錄，快去記帳吧！✨</div>')+
    '</div>';

}

    '<div id="aErr" class="err-msg"></div>'+
    '<button class="btn btn-gold btn-full" style="margin-top:12px" id="aBtnAdd">新增記錄 ✓</button>';
  el.querySelector('#aBtnE').addEventListener('click',function(){aType='expense';aCat='';renderAdd();});
  el.querySelector('#aBtnI').addEventListener('click',function(){aType='income';aCat='';renderAdd();});
  el.querySelector('#aPerson').addEventListener('change',function(){aPerson=this.value;});
  el.querySelector('#aAmt').addEventListener('input',function(){aAmt=this.value;});
  el.querySelector('#aDate').addEventListener('change',function(){aDate=this.value;});
  el.querySelector('#aNote').addEventListener('input',function(){aNote=this.value;});
  el.querySelectorAll('#aCatGrid .cat-chip').forEach(function(b){b.addEventListener('click',function(){aCat=b.dataset.cat;renderAdd();});});

}

// ═══════════════════════════════════════════════
// REPORT
// ═══════════════════════════════════════════════
var rMode='month',rY=new Date().getFullYear(),rM=new Date().getMonth(),rS='',rE='';
function getRepRec(){
  if(rMode==='custom'){
    if(!rS||!rE)return[];
    var s=new Date(rS+'T00:00:00'),e=new Date(rE+'T23:59:59');
    return _records.filter(function(r){var d=new Date(r.date);return d>=s&&d<=e;});
  }
  return _records.filter(function(r){var d=new Date(r.date);return d.getFullYear()===rY&&d.getMonth()===rM;});
}
function renderReport(){
  var mr=getRepRec();
  var inc=mr.filter(function(r){return r.type==='income';}).reduce(function(s,r){return s+r.amount;},0);
  var exp=mr.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
  var bal=inc-exp;
  var ebc=(_cats.expense||[]).map(function(cat){return{cat:cat,total:mr.filter(function(r){return r.type==='expense'&&r.category===cat;}).reduce(function(s,r){return s+r.amount;},0)};}).filter(function(c){return c.total>0;}).sort(function(a,b){return b.total-a.total;});
  var mx=ebc.length?ebc[0].total:1;
  var iP={},eP={};mr.forEach(function(r){var p=r.person||'未知';if(r.type==='income')iP[p]=(iP[p]||0)+r.amount;else eP[p]=(eP[p]||0)+r.amount;});
  var aP=Object.keys(Object.assign({},iP,eP));
  var yrs=[];_records.forEach(function(r){var y=new Date(r.date).getFullYear();if(yrs.indexOf(y)<0)yrs.push(y);});
  if(yrs.indexOf(new Date().getFullYear())<0)yrs.unshift(new Date().getFullYear());
  yrs.sort(function(a,b){return b-a;});
  var el=document.getElementById('tab-report');
  el.innerHTML='<div class="page-title">報表</div>'+
    '<div class="period-pills"><button class="pill'+(rMode==='month'?' active':'')+'" data-m="month">📅 月份</button><button class="pill'+(rMode==='custom'?' active':'')+'" data-m="custom">📆 自訂區間</button></div>'+
    (rMode==='month'?
      '<div class="month-picker"><select class="input" id="rY">'+yrs.map(function(y){return'<option value="'+y+'"'+(y===rY?' selected':'')+'>'+y+'年</option>';}).join('')+'</select><select class="input" id="rM">'+MO.map(function(m,i){return'<option value="'+i+'"'+(i===rM?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>':
      '<div class="date-range"><input class="input" type="date" id="rS" value="'+rS+'"><span>～</span><input class="input" type="date" id="rE" value="'+rE+'"><button class="btn btn-gold btn-sm" id="btnRQ" style="white-space:nowrap">查詢</button></div>')+
    '<div class="report-cards">'+
    '<div class="rep-card"><div class="rep-icon">💰</div><div class="r-label">總收入</div><div class="r-amt" style="color:#2e7d32">'+fmt(inc)+'</div></div>'+
    '<div class="rep-card"><div class="rep-icon">💸</div><div class="r-label">總支出</div><div class="r-amt" style="color:#c0505a">'+fmt(exp)+'</div></div>'+
    '<div class="rep-card" style="grid-column:1/-1"><div class="rep-icon">'+(bal>=0?'🏦':'⚠️')+'</div><div class="r-label">結餘</div><div class="r-amt" style="font-size:24px;color:'+(bal>=0?'#1565c0':'#c0505a')+'">'+fmt(bal)+'</div></div>'+
    '</div>'+
    (ebc.length?'<div class="section"><span class="sec-title">支出分類</span>'+ebc.map(function(ec){var cs=gc(ec.cat);return'<div class="bar-row"><div class="bar-icon" style="background:'+cs.b+';color:'+cs.c+'">'+cs.i+'</div><div class="bar-label">'+ec.cat+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(ec.total/mx*100)+'%;background:linear-gradient(90deg,'+cs.c+'88,'+cs.c+')"></div></div><div class="bar-amt">'+fmt(ec.total)+'</div></div>';}).join('')+'</div>':'')+
    (aP.length?'<div class="section"><span class="sec-title">個人統計</span>'+aP.map(function(p){return'<div class="person-row"><div style="font-weight:700">👤 '+p+'</div><div style="display:flex;gap:12px;font-size:13px">'+(iP[p]?'<span style="color:#2e7d32">收 '+fmt(iP[p])+'</span>':'')+(eP[p]?'<span style="color:#c0505a">支 '+fmt(eP[p])+'</span>':'')+'</div></div>';}).join('')+'</div>':'')+
    (mr.length===0?'<div class="empty">此期間尚無記錄</div>':'');
  el.querySelectorAll('.pill').forEach(function(p){p.addEventListener('click',function(){rMode=p.dataset.m;renderReport();});});
  if(rMode==='month'){
    el.querySelector('#rY').addEventListener('change',function(){rY=Number(this.value);renderReport();});
    el.querySelector('#rM').addEventListener('change',function(){rM=Number(this.value);renderReport();});
  } else {
    el.querySelector('#rS').addEventListener('change',function(){rS=this.value;});
    el.querySelector('#rE').addEventListener('change',function(){rE=this.value;});
    el.querySelector('#btnRQ').addEventListener('click',function(){rS=el.querySelector('#rS').value;rE=el.querySelector('#rE').value;if(!rS||!rE){showToast('請選擇開始和結束日期','err');return;}renderReport();});
  }
}

var hF='all',hS='';
function renderHistory(){
  var sorted=[].concat(_records).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var fil=sorted.filter(function(r){
    if(hF==='income'&&r.type!=='income')return false;
    if(hF==='expense'&&r.type!=='expense')return false;
    if(hS&&(r.category+' '+(r.note||'')+' '+r.person).indexOf(hS)<0)return false;
    return true;
  });
  var el=document.getElementById('tab-history');
  el.innerHTML='<div class="page-title">帳目明細</div>'+
    '<div class="hist-filters"><input class="input" style="flex:1" placeholder="搜尋備註、類別、人名..." id="hSearch" value="'+hS+'">'+
    '<select class="input" style="width:90px" id="hFilter"><option value="all"'+(hF==='all'?' selected':'')+'>全部</option><option value="income"'+(hF==='income'?' selected':'')+'>收入</option><option value="expense"'+(hF==='expense'?' selected':'')+'>支出</option></select></div>'+
    (fil.length?fil.map(recRowHtml).join(''):'<div class="empty">沒有符合的記錄</div>');

  el.querySelector('#hFilter').addEventListener('change',function(){hF=this.value;renderHistory();});
  bindRows(el);
}

// SETTINGS
// ═══════════════════════════════════════════════
var sTab='expense',sNew='';
function renderSettings(){
  var list=sTab==='persons'?_persons:(_cats[sTab]||[]);
  var el=document.getElementById('tab-settings');
  el.innerHTML='<div class="page-title">設定管理</div>'+
    '<div class="sett-tabs"><button class="sett-tab'+(sTab==='expense'?' active':'')+'" data-st="expense">💸 支出</button><button class="sett-tab'+(sTab==='income'?' active':'')+'" data-st="income">💰 收入</button><button class="sett-tab'+(sTab==='persons'?' active':'')+'" data-st="persons">👤 記帳人</button></div>'+
    '<div style="font-size:13px;color:#888;margin-bottom:14px">'+(sTab==='expense'?'管理支出類別':sTab==='income'?'管理收入類別':'管理記帳人名稱')+'</div>'+
    '<div class="tag-list">'+list.map(function(item){var cs=sTab!=='persons'?gc(item):{i:'👤',c:'#C9A84C',b:'#FDF6E3'};return'<div class="tag" style="background:'+cs.b+';border:1px solid '+cs.c+'44"><span style="font-size:15px">'+cs.i+'</span><span style="color:'+cs.c+'">'+item+'</span><button class="tag-del" data-item="'+item+'">✕</button></div>';}).join('')+(list.length===0?'<div style="color:#ccc;font-size:13px">尚無項目</div>':'')+'</div>'+
    '<div style="display:flex;gap:8px;align-items:center"><input class="input" style="flex:1" placeholder="'+(sTab==='persons'?'輸入姓名，例：媽媽':'輸入新類別名稱')+'" id="sNew" value="'+sNew+'"><button class="btn btn-gold btn-sm" id="sBtnAdd" style="white-space:nowrap">新增</button></div>'+
    '<div class="cloud-note">☁️ 所有設定即時同步至 Firebase</div>';
  el.querySelectorAll('.sett-tab').forEach(function(b){b.addEventListener('click',function(){sTab=b.dataset.st;sNew='';renderSettings();});});
  el.querySelectorAll('.tag-del').forEach(function(b){b.addEventListener('click',function(){
    var item=b.dataset.item;
    if(sTab==='persons'){if(_persons.length<=1){showToast('至少保留一位','err');return;}_persons=_persons.filter(function(p){return p!==item;});}
    else{_cats[sTab]=(_cats[sTab]||[]).filter(function(c){return c!==item;});}
    saveDB();showToast('已刪除','err');renderSettings();
  });});
  el.querySelector('#sNew').addEventListener('input',function(){sNew=this.value;});
  el.querySelector('#sBtnAdd').addEventListener('click',function(){
    var v=sNew.trim();if(!v)return;
    if(sTab==='persons'){if(_persons.indexOf(v)>=0){showToast('已有相同名稱','err');return;}_persons.push(v);}
    else{if((_cats[sTab]||[]).indexOf(v)>=0){showToast('類別已存在','err');return;}_cats[sTab]=(_cats[sTab]||[]).concat([v]);}
    sNew='';saveDB();showToast('✅ 新增成功！');renderSettings();
  });
}

// ═══════════════════════════════════════════════
// EDIT
// ═══════════════════════════════════════════════
var editId=null,editType='expense',editCat='';
function refreshEditType(){
  document.getElementById('editBtnExp').className='type-btn'+(editType==='expense'?' exp':'');
  document.getElementById('editBtnInc').className='type-btn'+(editType==='income'?' inc':'');
  document.getElementById('editCatGrid').innerHTML=catGridHtml(editType,editCat);
  document.querySelectorAll('#editCatGrid .cat-chip').forEach(function(b){b.addEventListener('click',function(){editCat=b.dataset.cat;refreshEditType();});});
}
function openEdit(id){
  var r=_records.filter(function(x){return x.id===id;})[0];if(!r)return;
  editId=id;editType=r.type;editCat=r.category;
  var sel=document.getElementById('editPerson');
  sel.innerHTML='<option value="">— 請選擇記帳人 —</option>'+_persons.map(function(p){return'<option value="'+p+'"'+(p===r.person?' selected':'')+'>'+p+'</option>';}).join('');
  document.getElementById('editAmt').value=r.amount;
  document.getElementById('editDate').value=r.date;
  document.getElementById('editNote').value=r.note||'';
  document.getElementById('editErr').textContent='';
  refreshEditType();
  document.getElementById('editModal').classList.add('open');
}
function confirmEdit(){
  var amt=document.getElementById('editAmt').value;
  var person=document.getElementById('editPerson').value;
  var date=document.getElementById('editDate').value;
  var note=document.getElementById('editNote').value;
  if(!amt||isNaN(amt)||Number(amt)<=0){document.getElementById('editErr').textContent='請輸入有效金額';return;}
  if(!person){document.getElementById('editErr').textContent='請選擇記帳人';return;}
  if(!editCat){document.getElementById('editErr').textContent='請選擇類別';return;}
  for(var i=0;i<_records.length;i++){
    if(_records[i].id===editId){
      _records[i]=Object.assign({},_records[i],{type:editType,amount:Number(amt),category:editCat,person:person,date:date,note:note});
      break;
    }
  }
  saveDB();showToast('✅ 修改成功！');
  document.getElementById('editModal').classList.remove('open');
  renderTab(curTab);
}

// DELETE
// ═══════════════════════════════════════════════
var pendingDel=null;
function askDel(id){pendingDel=id;document.getElementById('confirmModal').classList.add('open');}
</script>
